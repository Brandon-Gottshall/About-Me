name: Publish documents

on:
  push:
    branches:
      - master
    paths:
      - "config/**"
      - "content/**"
      - "document_pipeline/**"
      - "schemas/**"
      - "scripts/**"
      - "src/**"
      - "templates/**"
      - "Makefile"
      - "requirements.txt"
      - ".github/workflows/publish-documents.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build public document set
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install TeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-font-awesome \
            fonts-roboto-unhinted \
            poppler-utils \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-xetex

      - name: Validate YAML content and configuration
        run: make validate PYTHON=python

      - name: Build PDFs, HTML, showcase, and manifest
        run: make all PYTHON=python

      - name: Confirm public artefacts exist
        run: |
          set -euo pipefail
          for file in resume.pdf cv.pdf leadership_resume.pdf coverletter.pdf \
                       resume.html cv.html leadership_resume.html \
                       documents.json; do
            test -s "output/$file" || { echo "missing output/$file" >&2; exit 1; }
          done

      - name: Enforce two-page resume contract
        run: |
          pages="$(pdfinfo output/resume.pdf | awk '/^Pages:/ {print $2}')"
          test "$pages" = "2" || {
            echo "resume.pdf must be exactly 2 pages; got $pages" >&2
            exit 1
          }

      - name: Scan privacy surfaces
        run: make privacy-scan PYTHON=python

      - name: Prepare Pages artifact (jekyll-disable + manifest copy)
        run: |
          touch output/.nojekyll
          cp exports/profile.json output/profile.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
