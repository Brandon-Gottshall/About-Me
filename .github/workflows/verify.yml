name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate YAML
        run: make validate PYTHON=python

      - name: Run tests
        run: make test PYTHON=python

      - name: Check module CLI
        run: python -m document_pipeline --help

      - name: Generate LaTeX
        run: python -m document_pipeline generate resume cv cover-letter leadership-resume

      - name: Export portfolio data
        run: make export PYTHON=python

      - name: Scan privacy surfaces
        run: make privacy-scan PYTHON=python

  pdf:
    name: PDF smoke build
    runs-on: ubuntu-latest
    needs: python
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install TeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-font-awesome \
            fonts-roboto-unhinted \
            poppler-utils \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-xetex

      - name: Build PDFs and previews
        run: make all PYTHON=python

      - name: Scan privacy surfaces
        run: make privacy-scan PYTHON=python

      - name: Upload document artifacts
        uses: actions/upload-artifact@v4
        with:
          name: about-me-documents
          path: |
            output/*.pdf
            exports/profile.json
            docs/showcase/*.png
