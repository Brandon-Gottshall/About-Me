text: "Founder and principal engineer of Scrutable, an independent software, research, and systems practice. Software engineer and technical leader with experience building web applications, internal tools, AI-enabled workflows, and cloud infrastructure. Marine Corps veteran and former technology instructor with a background in quality assurance, operational systems, mentoring, and cross-functional leadership."

leadership_resume: "Marine Corps veteran, accredited technology instructor, and former low brass section leader with experience leading teams in high-pressure environments, training and mentoring learners from beginner to advanced, and building cohesive ensembles. Known for leading from the front, setting clear expectations, and using structured systems (SOPs, mentorship frameworks, and daily practice plans) to help people grow with confidence and accountability."

# Alternative summaries (commented out in the original):
# alternatives:
#   - "Results-driven Software Engineer with a background in the U.S. Marine Corps, bringing a unique blend of technical expertise, leadership, and problem-solving skills to software development. Proven track record of delivering high-impact solutions by leveraging modern technologies including TypeScript, React, Node.js, Docker, and cloud platforms (AWS/GCP). Experienced in implementing CI/CD pipelines, containerization, and infrastructure as code (IaC) to streamline development workflows. Adept at leading cross-functional teams, optimizing development processes, and implementing engineering best practices. Combines military discipline with technical acumen to drive innovation and exceed project objectives. Passionate about mentoring junior developers, contributing to open-source communities, and staying current with emerging technologies."
#   - "Software engineer with 5+ years delivering secure, scalable applications using JavaScript (React, Node.js, TypeScript) in cloud-native environments (AWS/GCP). Experienced in building responsive customer-facing apps, managing relational and NoSQL databases, and streamlining workflows through clear documentation, effective DevOps practices, and collaborative agile development. Combines technical proficiency with disciplined leadership from a military background, ensuring accountability and strong team communication. Passionate about simplifying developers' lives by embedding security seamlessly into development processes."
