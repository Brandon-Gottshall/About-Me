text: "Founder and managing alchemist of Scrutable™, an independent software product practice built from independently owned systems, research, and operational assets. Designs AI-enabled product factories that transform business data and operating context into cohesive applications, then directs the strategy, architecture, infrastructure, and delivery needed to ship them. Marine Corps veteran and former accredited technology instructor with a background in quality assurance, communication, mentoring, and cross-functional leadership."

cv: "Software engineer with a record spanning full-stack web development, technical instruction, and Marine Corps utilities engineering. Builds learning systems, document pipelines, and interactive web experiences in TypeScript/Next.js and Python; previously delivered technology curricula as an accredited instructor and maintained life-sustaining critical utilities infrastructure — generators, power distribution, and refrigerant systems — for expeditionary sites, including micro-grids built from AMMPS-series generators. This curriculum vitae is the comprehensive record; a condensed resume is generated from the same source data."

leadership_resume: "Marine Corps veteran, accredited technology instructor, and former low brass section leader with experience leading teams in high-pressure environments, training and mentoring learners from beginner to advanced, and building cohesive ensembles. Known for leading from the front, setting clear expectations, and using structured systems (SOPs, mentorship frameworks, and daily practice plans) to help people grow with confidence and accountability."
