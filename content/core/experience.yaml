  - title: "Engineer Electrical Systems Technician"
    organization: "United States Marine Corps"
    location: "MCAS Cherry Point, NC"
    start_date: "Sep 2015"
    end_date: "Apr 2018"
    items:
      - "Performed preventive and corrective maintenance on generators, pumps, and power distribution systems."
      - "Created micro-grids with AMMPS (Advanced Medium Mobile Power Sources) generators to power expeditionary sites."
      - "Deployed to Incirlik Air Base, Turkey (2017) supporting VMAQ-3's electronic-warfare operations against Da'esh under Operation Inherent Resolve."
      - "As half of a two-Marine power team, kept the generator site, HVAC, and power distribution online — carrying communications through active grid outages on redundant generator power."
      - "Diagnosed electrical and mechanical malfunctions; logged work orders per technical manuals."
      - "Assisted senior technicians and trained new Marines on maintenance procedures."
