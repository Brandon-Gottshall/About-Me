# Default Cover Letter Paragraphs

paragraphs:
  standard_intro:
    text: |
      I am excited to apply for a software engineering role where reliable interfaces, clear systems, and practical automation matter. My background combines front-end and full-stack software development, technical instruction, and operational discipline from Marine Corps service.

  standard_experience:
    text: |
      In recent work, I have built TypeScript and Next.js applications, internal tools, and AI-assisted workflows that support production teams and client deliverables. I am comfortable translating design intent into responsive interfaces, working across cloud and deployment surfaces, and keeping documentation and delivery practices repeatable.

      My teaching and leadership experience also shape how I work with teams. I value clear expectations, code review, steady communication, and helping others build confidence with unfamiliar tools.

  standard_closing:
    text: |
      Thank you for considering my application. I would welcome the opportunity to discuss how my background in software, instruction, and structured operations can support your team.
